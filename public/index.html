<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plasmodium</title>
    <link rel="stylesheet" href="/styles.css?v=20260401-1124" />
  </head>
  <body>
    <canvas id="physarumBackground" class="physarum-background"></canvas>
    <div class="shell">
      <section id="loginView" class="login-shell">
        <div class="login-frame panel simple-panel login-panel">
          <h1 class="login-wordmark">PLASMODIUM</h1>
          <div class="stacked-actions login-actions">
            <button id="connectButton">Sign in with Ethereum</button>
            <button id="anonymousJoinButton" class="ghost-button">Or enter anonymously</button>
          </div>
          <div class="login-note hidden" id="walletHint"></div>
        </div>
      </section>

      <div id="appView" class="app-shell hidden">
        <header class="topbar panel simple-panel">
          <div class="topbar-title">
            <h1>Plasmodium</h1>
            <p id="callStatus" class="muted-copy">Join a room to enter.</p>
          </div>
          <div class="status-card simple-card">
            <div><span>Identity</span><strong id="walletValue">Disconnected</strong></div>
            <div><span>Peer ID</span><strong id="peerIdValue">—</strong></div>
            <div><span>Room ID</span><strong id="roomValue">—</strong></div>
            <div class="status-card-actions">
              <button id="copyLinkButton" class="ghost-button hidden">Copy room link</button>
            </div>
          </div>
        </header>

        <main class="app-layout">
          <section id="preJoinPanel" class="panel simple-panel prejoin-panel hidden">
            <div class="cta-block">
              <p class="cta-kicker">Ready when you are</p>
              <button id="joinButton" class="cta-button" disabled>Open room</button>
              <p class="muted-copy cta-instructions">Create a room, then share the room link once it appears above.</p>
            </div>
          </section>

          <section id="roomContentGrid" class="content-grid hidden">
            <section class="panel simple-panel stage-panel">
              <div class="section-head">
                <h2>Video</h2>
                <div class="presence-chip" id="presenceCount">0 people here</div>
              </div>
              <div class="stage-actions">
                <button id="goLiveButton" class="hidden">Go live</button>
                <button id="watchStageButton" class="hidden ghost-button">Watch stage</button>
                <button id="leaveStageButton" class="hidden ghost-button">Leave stage</button>
                <button id="leaveButton" class="ghost-button hidden">Leave room</button>
              </div>
              <div id="videoShell" class="video-shell hidden">
                <div id="videoGrid" class="video-grid stage-layout">
                  <div id="remoteVideoGrid" class="remote-video-grid"></div>
                  <figure id="localFigure" class="self-video hidden">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <figcaption>You</figcaption>
                  </figure>
                </div>
              </div>
            </section>
          </section>

          <section class="meta-grid room-meta hidden" id="roomMetaGrid">
            <section class="panel simple-panel map-panel">
              <div class="section-head">
                <h2>Network</h2>
              </div>
              <div id="peerViz"></div>
              <ul id="peerList" class="network-participants"></ul>
            </section>

            <section class="panel simple-panel log-panel">
              <div class="section-head">
                <h2>Activity</h2>
              </div>
              <pre id="log"></pre>
            </section>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="/app.js?v=20260401-1124"></script>
  </body>
</html>
